line-length = 100
target-version = "py311"

[lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "B",    # flake8-bugbear
  "UP",   # pyupgrade
  "SIM",  # flake8-simplify
  "RUF",  # ruff-specific
]
ignore = [
  "E501",  # line length handled by formatter where sensible
]

[lint.per-file-ignores]
"tests/*" = ["S101"]  # asserts are fine in tests

[format]
quote-style = "double"
indent-style = "space"
